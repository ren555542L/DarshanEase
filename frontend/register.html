<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – DarshanEase</title>
  <meta name="description" content="Create your DarshanEase account to start booking darshan tickets." />
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="bg-particles" id="particles"></div>

  <nav class="navbar">
    <div class="navbar-brand" onclick="window.location='index.html'" style="cursor:pointer;">
      <div class="logo-icon">🛕</div>
      <span>Darshan<span class="gradient-text">Ease</span></span>
    </div>
    <div class="navbar-actions">
      <a href="login.html" class="btn btn-outline btn-sm">Login</a>
    </div>
  </nav>

  <div class="auth-page" style="padding:100px 24px 40px;">
    <div class="auth-card animate-up" style="max-width:520px;">
      <div class="auth-logo">
        <div class="logo-icon">🛕</div>
        <h1 style="font-size:1.6rem;margin-top:8px;">Create Account</h1>
        <p class="text-muted text-sm">Begin your divine journey with DarshanEase</p>
      </div>

      <div id="alertBox"></div>

      <form id="registerForm" novalidate>
        <!-- Role Selector -->
        <div class="form-group">
          <label class="form-label">Register as</label>
          <div style="display:flex;gap:8px;">
            <label class="role-option" id="role-user" style="flex:1;padding:12px;border-radius:8px;border:1px solid rgba(255,107,53,0.4);background:rgba(255,107,53,0.08);text-align:center;cursor:pointer;">
              <div style="font-size:1.3rem;">🙏</div>
              <div style="font-size:0.85rem;font-weight:600;margin-top:4px;color:var(--primary);">Devotee</div>
              <input type="radio" name="role" value="user" style="display:none;" checked />
            </label>
            <label class="role-option" id="role-organizer" style="flex:1;padding:12px;border-radius:8px;border:1px solid var(--glass-border);text-align:center;cursor:pointer;">
              <div style="font-size:1.3rem;">🏛️</div>
              <div style="font-size:0.85rem;font-weight:600;margin-top:4px;color:var(--text-secondary);">Organizer</div>
              <input type="radio" name="role" value="organizer" style="display:none;" />
            </label>
          </div>
        </div>

        <div class="grid-2" style="gap:16px;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Full Name</label>
            <div class="input-group">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="name" class="form-control" placeholder="Ram Sharma" required />
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Phone Number</label>
            <div class="input-group">
              <i class="fas fa-phone input-icon"></i>
              <input type="tel" id="phone" class="form-control" placeholder="9876543210" required />
            </div>
          </div>
        </div>
        <div class="form-group mt-2">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="your@email.com" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <div class="input-group">
            <i class="fas fa-home input-icon"></i>
            <input type="text" id="address" class="form-control" placeholder="City, State" />
          </div>
        </div>
        <div class="grid-2" style="gap:16px;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Password</label>
            <div class="input-group">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required />
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required />
            </div>
          </div>
        </div>

        <p class="text-xs text-muted mt-2 mb-3">By registering, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>

        <button type="submit" class="btn btn-primary w-100 btn-lg" id="registerSubmit">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <p class="text-center text-sm mt-3" style="color:var(--text-secondary);">
        Already have an account? <a href="login.html" class="gradient-text fw-bold">Sign in</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/app.js"></script>
  <script>
    // Particles
    const pe = document.getElementById('particles');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = Math.random() * 5 + 2;
      p.style.cssText = `width:${s}px;height:${s}px;background:${['var(--primary)','var(--gold)'][Math.floor(Math.random()*2)]};left:${Math.random()*100}%;animation-delay:${Math.random()*15}s;animation-duration:${Math.random()*12+8}s;`;
      pe.appendChild(p);
    }

    // Role toggle
    document.querySelectorAll('input[name="role"]').forEach(radio => {
      radio.closest('label').addEventListener('click', () => {
        document.querySelectorAll('.role-option').forEach(el => {
          el.style.borderColor = 'var(--glass-border)';
          el.style.background = 'transparent';
          el.querySelector('div:last-child').style.color = 'var(--text-secondary)';
          el.querySelector('input').checked = false;
        });
        const lbl = radio.closest('label');
        lbl.style.borderColor = 'rgba(255,107,53,0.4)';
        lbl.style.background = 'rgba(255,107,53,0.08)';
        lbl.querySelector('div:last-child').style.color = 'var(--primary)';
        radio.checked = true;
      });
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const address = document.getElementById('address').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const role = document.querySelector('input[name="role"]:checked')?.value || 'user';

      if (password !== confirmPassword) {
        document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i>Passwords do not match</div>`;
        return;
      }
      if (password.length < 6) {
        document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i>Password must be at least 6 characters</div>`;
        return;
      }

      const btn = document.getElementById('registerSubmit');
      btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px;"></span> Creating account...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, email, address, password, role })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showToast('Account created! Welcome to DarshanEase 🙏', 'success');
          setTimeout(() => window.location = 'index.html', 1000);
        } else {
          document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i>${data.message}</div>`;
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
          btn.disabled = false;
        }
      } catch (err) {
        document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i>Could not connect to server.</div>`;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
