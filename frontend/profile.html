<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – DarshanEase</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="mesh-bg"></div>

  <nav class="navbar" id="navbar">
    <div class="navbar-brand" onclick="window.location='index.html'" style="cursor:pointer;">
      <div class="logo-icon">🛕</div>
      <span>Darshan<span class="gradient-text">Ease</span></span>
    </div>
    <ul class="navbar-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="temples.html">Temples</a></li>
      <li><a href="my-bookings.html">My Bookings</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
    </ul>
    <div class="navbar-actions">
      <span id="userGreeting" class="hidden" style="color:var(--text-secondary);font-size:0.9rem;"></span>
      <button id="logoutBtn" class="btn btn-ghost btn-sm hidden">Logout</button>
    </div>
  </nav>

  <div class="page-content">
    <div class="container" style="max-width:800px;padding:40px 24px 80px;">
      <h1 style="margin-bottom:4px;">My <span class="gradient-text">Profile</span></h1>
      <p class="text-muted mb-4">Manage your account details</p>

      <div class="grid-2" style="gap:28px;align-items:start;">
        <!-- Profile Card -->
        <div class="glow-card" style="padding:28px;text-align:center;">
          <div style="width:88px;height:88px;border-radius:50%;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto 16px;box-shadow:var(--shadow-glow);" id="avatarCircle">🙏</div>
          <h2 id="profileName" style="font-size:1.3rem;margin-bottom:4px;">–</h2>
          <div class="badge badge-primary mb-2" id="profileRole">user</div>
          <div class="text-sm text-muted" id="profileEmail">–</div>
          <div class="text-sm text-muted mt-1" id="profilePhone">–</div>
          <div class="divider" style="margin:16px 0;"></div>
          <div class="grid-2" style="gap:12px;margin-bottom:4px;">
            <div style="padding:12px;background:var(--glass);border-radius:8px;">
              <div class="fw-bold" id="totalBookings" style="font-size:1.5rem;color:var(--primary);">–</div>
              <div class="text-xs text-muted">Bookings</div>
            </div>
            <div style="padding:12px;background:var(--glass);border-radius:8px;">
              <div class="fw-bold" id="templesCount" style="font-size:1.5rem;color:var(--gold);">–</div>
              <div class="text-xs text-muted">Temples</div>
            </div>
          </div>
        </div>

        <!-- Edit Form -->
        <div>
          <div class="glow-card" style="padding:24px;margin-bottom:20px;">
            <h3 style="margin-bottom:16px;font-size:1.1rem;">Update Profile</h3>
            <div id="profileAlert"></div>
            <form id="profileForm">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                  <i class="fas fa-user input-icon"></i>
                  <input type="text" id="updName" class="form-control" placeholder="Full Name" />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <div class="input-group">
                  <i class="fas fa-phone input-icon"></i>
                  <input type="text" id="updPhone" class="form-control" placeholder="Phone number" />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Address</label>
                <div class="input-group">
                  <i class="fas fa-home input-icon"></i>
                  <input type="text" id="updAddress" class="form-control" placeholder="City, State" />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100" id="updateBtn">
                <i class="fas fa-save"></i> Save Changes
              </button>
            </form>
          </div>

          <!-- Quick Actions -->
          <div class="glow-card" style="padding:20px;">
            <h3 style="margin-bottom:12px;font-size:1rem;">Quick Actions</h3>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <a href="my-bookings.html" class="btn btn-outline btn-sm" style="justify-content:flex-start;">
                <i class="fas fa-ticket-alt" style="color:var(--primary);"></i> View My Bookings
              </a>
              <a href="temples.html" class="btn btn-outline btn-sm" style="justify-content:flex-start;">
                <i class="fas fa-search" style="color:var(--gold);"></i> Explore Temples
              </a>
              <button class="btn btn-danger btn-sm" style="justify-content:flex-start;" onclick="doLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/app.js"></script>
  <script>
    async function loadProfile() {
      const token = localStorage.getItem('token');
      if (!token) { window.location = 'login.html'; return; }

      try {
        const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (!data.success) { window.location = 'login.html'; return; }
        const u = data.user;
        document.getElementById('avatarCircle').textContent = u.name[0].toUpperCase();
        document.getElementById('profileName').textContent = u.name;
        document.getElementById('profileRole').textContent = u.role.charAt(0).toUpperCase() + u.role.slice(1);
        document.getElementById('profileEmail').textContent = u.email;
        document.getElementById('profilePhone').textContent = u.phone || 'No phone set';
        document.getElementById('updName').value = u.name;
        document.getElementById('updPhone').value = u.phone || '';
        document.getElementById('updAddress').value = u.address || '';

        // Load booking stats
        const bRes = await fetch('/api/bookings/my', { headers: { 'Authorization': 'Bearer ' + token } });
        const bData = await bRes.json();
        if (bData.success) {
          document.getElementById('totalBookings').textContent = bData.data.length;
          document.getElementById('templesCount').textContent = [...new Set(bData.data.map(b => b.templeId?._id).filter(Boolean))].length;
        }
      } catch(e) { showToast('Error loading profile', 'error'); }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('token');
      const btn = document.getElementById('updateBtn');
      btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Saving...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/updateprofile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({
            name: document.getElementById('updName').value,
            phone: document.getElementById('updPhone').value,
            address: document.getElementById('updAddress').value
          })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Profile updated successfully!', 'success');
          document.getElementById('profileName').textContent = data.user.name;
          document.getElementById('avatarCircle').textContent = data.user.name[0].toUpperCase();
          const stored = JSON.parse(localStorage.getItem('user') || '{}');
          localStorage.setItem('user', JSON.stringify({...stored, name: data.user.name}));
        } else showToast(data.message, 'error');
      } catch(e) { showToast('Error updating profile', 'error'); }
      btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
      btn.disabled = false;
    });

    function doLogout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location = 'login.html';
    }

    window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50));
    loadProfile();
  </script>
</body>
</html>
